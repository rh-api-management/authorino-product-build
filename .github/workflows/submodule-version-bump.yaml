name: Submodule Version Bump

on:
  schedule:
    # Run daily at 6:00 AM UTC
    - cron: '0 6 * * *'
  workflow_dispatch: # Allow manual triggering

jobs:
  check-and-bump-version:
    runs-on: ubuntu-latest
    # Only run on the default branch
    if: github.ref_name == github.event.repository.default_branch
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout repository with submodules
        uses: actions/checkout@v4
        with:
          submodules: true
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Fetch all tags from submodule
        run: |
          cd authorino
          git fetch --tags origin
          cd ..

      - name: Get current submodule version
        id: current_version
        run: |
          cd authorino
          CURRENT_TAG=$(git describe --tags --exact-match 2>/dev/null || echo "")
          if [ -z "$CURRENT_TAG" ]; then
            # If not on a tag, get the closest tag
            CURRENT_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          fi
          echo "tag=$CURRENT_TAG" >> $GITHUB_OUTPUT
          echo "Current version: $CURRENT_TAG"
          cd ..

      - name: Get latest semver tag from submodule
        id: latest_version
        run: |
          cd authorino
          # Get all tags matching semver pattern (vX.Y.Z)
          LATEST_TAG=$(git tag -l 'v[0-9]*.[0-9]*.[0-9]*' | sort -V | tail -n 1)
          echo "tag=$LATEST_TAG" >> $GITHUB_OUTPUT
          echo "Latest version: $LATEST_TAG"
          cd ..

      - name: Compare versions
        id: compare
        run: |
          CURRENT="${{ steps.current_version.outputs.tag }}"
          LATEST="${{ steps.latest_version.outputs.tag }}"

          # Remove 'v' prefix for comparison
          CURRENT_NUM=${CURRENT#v}
          LATEST_NUM=${LATEST#v}

          echo "Comparing $CURRENT_NUM with $LATEST_NUM"

          if [ "$CURRENT" = "$LATEST" ]; then
            echo "needs_update=false" >> $GITHUB_OUTPUT
            echo "No update needed - already on latest version"
          else
            # Simple version comparison using sort -V
            NEWER=$(printf "%s\n%s" "$CURRENT_NUM" "$LATEST_NUM" | sort -V | tail -n 1)
            if [ "$NEWER" = "$LATEST_NUM" ] && [ "$CURRENT_NUM" != "$LATEST_NUM" ]; then
              echo "needs_update=true" >> $GITHUB_OUTPUT
              echo "Update needed: $CURRENT -> $LATEST"
            else
              echo "needs_update=false" >> $GITHUB_OUTPUT
              echo "Current version is newer or equal"
            fi
          fi

      - name: Update submodule to latest tag
        if: steps.compare.outputs.needs_update == 'true'
        run: |
          LATEST_TAG="${{ steps.latest_version.outputs.tag }}"
          cd authorino
          git checkout "$LATEST_TAG"
          cd ..
          git add authorino

      - name: Update version in Containerfile
        if: steps.compare.outputs.needs_update == 'true'
        run: |
          LATEST_TAG="${{ steps.latest_version.outputs.tag }}"
          VERSION_NUM=${LATEST_TAG#v}

          # Update the LABEL version line in Containerfile.authorino
          sed -i "s/^LABEL version=\"[^\"]*\"/LABEL version=\"$VERSION_NUM\"/" Containerfile.authorino

          echo "Updated Containerfile.authorino version to $VERSION_NUM"
          cat Containerfile.authorino | grep "LABEL version"

      - name: Check for changes
        if: steps.compare.outputs.needs_update == 'true'
        id: changes
        run: |
          if git diff --staged --quiet && git diff --quiet; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push changes
        if: steps.compare.outputs.needs_update == 'true' && steps.changes.outputs.has_changes == 'true'
        id: commit
        run: |
          LATEST_TAG="${{ steps.latest_version.outputs.tag }}"
          BRANCH_NAME="auto/bump-authorino-$LATEST_TAG"
          DEFAULT_BRANCH="${{ github.event.repository.default_branch }}"

          # Create a new branch
          git checkout -b "$BRANCH_NAME"

          # Stage all changes
          git add Containerfile.authorino authorino

          # Commit changes
          git commit -m "Bump authorino submodule to $LATEST_TAG

          This automated update bumps the authorino submodule to $LATEST_TAG
          and updates the version in Containerfile.authorino accordingly.

          Updated files:
          - authorino submodule -> $LATEST_TAG
          - Containerfile.authorino version label

          Co-Authored-By: github-actions[bot] <github-actions[bot]@users.noreply.github.com>"

          # Push branch
          git push origin "$BRANCH_NAME"

          echo "branch=$BRANCH_NAME" >> $GITHUB_OUTPUT
          echo "base_branch=$DEFAULT_BRANCH" >> $GITHUB_OUTPUT

      - name: Create Pull Request
        if: steps.compare.outputs.needs_update == 'true' && steps.changes.outputs.has_changes == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          LATEST_TAG="${{ steps.latest_version.outputs.tag }}"
          CURRENT_TAG="${{ steps.current_version.outputs.tag }}"
          BRANCH_NAME="${{ steps.commit.outputs.branch }}"
          BASE_BRANCH="${{ steps.commit.outputs.base_branch }}"

          gh pr create \
            --title "chore: Bump authorino to $LATEST_TAG" \
            --body "## Summary

          This automated PR bumps the authorino submodule from \`$CURRENT_TAG\` to \`$LATEST_TAG\`.

          ## Changes
          - Updated authorino submodule to tag $LATEST_TAG
          - Updated version in \`Containerfile.authorino\` to match

          ## Testing
          - [ ] Verify the submodule points to the correct tag
          - [ ] Check that the Containerfile version matches the submodule tag
          - [ ] Run build tests to ensure compatibility

          ---
          🤖 This PR was automatically created by the [submodule-version-bump workflow](.github/workflows/submodule-version-bump.yaml)" \
            --base "$BASE_BRANCH" \
            --head "$BRANCH_NAME"

      - name: Summary
        if: always()
        run: |
          echo "## Version Check Summary" >> $GITHUB_STEP_SUMMARY
          echo "- Current version: ${{ steps.current_version.outputs.tag }}" >> $GITHUB_STEP_SUMMARY
          echo "- Latest version: ${{ steps.latest_version.outputs.tag }}" >> $GITHUB_STEP_SUMMARY
          echo "- Update needed: ${{ steps.compare.outputs.needs_update }}" >> $GITHUB_STEP_SUMMARY
          if [ "${{ steps.compare.outputs.needs_update }}" = "true" ]; then
            echo "- PR created: ✅" >> $GITHUB_STEP_SUMMARY
          fi
