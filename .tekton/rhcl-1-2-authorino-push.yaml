apiVersion: tekton.dev/v1
kind: PipelineRun
metadata:
  annotations:
    build.appstudio.openshift.io/repo: https://github.com/rh-api-management/authorino-product-build?rev={{revision}}
    build.appstudio.redhat.com/commit_sha: '{{revision}}'
    build.appstudio.redhat.com/target_branch: '{{target_branch}}'
    pipelinesascode.tekton.dev/cancel-in-progress: "false"
    pipelinesascode.tekton.dev/max-keep-runs: "3"
    pipelinesascode.tekton.dev/on-cel-expression: event == "push" && target_branch == "rhcl-1.1"
  creationTimestamp:
  labels:
    appstudio.openshift.io/application: rhcl-1-2-authorino
    appstudio.openshift.io/component: rhcl-1-2-authorino
    pipelines.appstudio.openshift.io/type: build
  name: rhcl-1-2-authorino-on-push
  namespace: api-management-tenant
spec:
  params:
  - name: git-url
    value: '{{source_url}}'
  - name: revision
    value: '{{revision}}'
  - name: output-image
    value: quay.io/redhat-user-workloads/api-management-tenant/rhcl-1-2-authorino:{{revision}}
  - name: dockerfile
    value: Containerfile.authorino
  - name: prefetch-input
    value: '{"type": "gomod", "path": "authorino/"}'
  pipelineRef:
    name: build-pipeline
  taskRunTemplate:
    serviceAccountName: build-pipeline-rhcl-1-2-authorino
  workspaces:
  - name: git-auth
    secret:
      secretName: '{{ git_auth_secret }}'
status: {}
  